name: Android APK Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    # 대기 줄이 전혀 없는 최신 버전 컴퓨터로 변경하여 즉시 실행되게 합니다.
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 1. project.zip 압축 해제
    - name: Unzip project
      run: |
        unzip project.zip
        mv project/* .
        rm -rf project project.zip

    # 2. 최신 우분투에서도 빌도저가 충돌 나지 않도록 리눅스 필수 자재 설치
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good libsqlite3-dev lld libffi-dev libssl-dev autoconf automake libtool pkg-config cmake modules-dev libasound2-dev openjdk-17-jdk unzip

    # 3. 파이썬 최신 안정 버전 세팅
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 4. 최신 환경에서 가상환경이 깨지는 것을 막기 위해 빌드 도구 버전 강제 고정
    - name: Pre-install Build Tools
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0" virtualenv buildozer

    # 5. 빌도저로 APK 굽기 (약관 자동 동의)
    - name: Build APK with Buildozer
      run: |
        yes | buildozer android debug

    # 6. 완성된 APK 파일 업로드 보관함으로 전송
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: My-Alarm-App-APK
        path: bin/*.apk
